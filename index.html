<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письма Призрака - Стол улик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #1a0f0a;
            background-image: linear-gradient(45deg, #2c1a12 0%, #1a0f0a 100%);
            color: #e8d5b5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            max-width: 1200px;
            width: 100%;
            background-color: rgba(44, 26, 18, 0.9);
            border: 3px solid #b68b6e;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(182, 139, 110, 0.3);
            position: relative;
        }
        
        .game-container::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed #b68b6e;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0.5;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #e8d5b5;
            text-shadow: 3px 3px 0 #4a2e1e, 5px 5px 0 #000;
            letter-spacing: 4px;
            font-weight: bold;
        }
        
        h1 span {
            font-size: 1.2em;
            filter: drop-shadow(0 0 5px #b68b6e);
        }
        
        .categories {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .category {
            background: linear-gradient(145deg, #3d291f, #2b1c14);
            border: 2px solid #b68b6e;
            border-radius: 15px;
            padding: 15px 25px;
            min-width: 150px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #4f3829, inset 0 0 10px rgba(182, 139, 110, 0.3);
            font-size: 1.3em;
            font-weight: bold;
            color: #f0e0c0;
            position: relative;
        }
        
        .category:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #4f3829, inset 0 0 15px #b68b6e;
        }
        
        .category:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #4f3829;
        }
        
        .card-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        
        .card-place {
            width: 250px;
            height: 350px;
            background: linear-gradient(145deg, #4a3224, #2f1f16);
            border: 3px solid #b68b6e;
            border-radius: 15px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #b68b6e;
            box-shadow: 0 10px 0 #3a261d, inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
        }
        
        .card-place img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .card-place.has-card img {
            display: block;
        }
        
        .card-place.has-card .placeholder {
            display: none;
        }
        
        .placeholder {
            text-align: center;
            color: #b68b6e;
            font-size: 3em;
        }
        
        .draw-btn {
            background: linear-gradient(145deg, #8b6f50, #5f4837);
            border: none;
            border-radius: 50px;
            padding: 18px 40px;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffebcd;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 7px 0 #3e2e22, 0 10px 20px rgba(0,0,0,0.4);
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #d4a574;
        }
        
        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 9px 0 #3e2e22, 0 15px 25px rgba(0,0,0,0.4);
        }
        
        .draw-btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #3e2e22;
        }
        
        .message-area {
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            color: #d4a574;
            border: 1px solid #b68b6e;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .category { min-width: 100px; padding: 12px 15px; font-size: 1em; }
            .draw-btn { font-size: 1.2em; padding: 15px 25px; }
            .card-place { width: 200px; height: 280px; }
            .placeholder { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>
            <span>🕯️</span> СТОЛ УЛИК <span>🕯️</span>
        </h1>
        
        <div class="categories">
            <div class="category" id="category-motiv">🗡️ МОТИВ</div>
            <div class="category" id="category-mesto">📍 МЕСТО</div>
            <div class="category" id="category-sposob">⚰️ СПОСОБ</div>
        </div>
        
        <div class="card-area">
            <div class="card-place" id="card-slot">
                <div class="placeholder">🃏</div>
                <img id="card-image" src="" alt="Улика">
            </div>
            
            <button class="draw-btn" id="draw-card-btn">
                🎴 Взять улику
            </button>
            
            <div class="message-area" id="message-area">
                Нажми на кнопку, чтобы вытянуть улику
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const drawBtn = document.getElementById('draw-card-btn');
        const cardSlot = document.getElementById('card-slot');
        const cardImage = document.getElementById('card-image');
        const placeholder = document.querySelector('.placeholder');
        const messageArea = document.getElementById('message-area');
        const motivBtn = document.getElementById('category-motiv');
        const mestoBtn = document.getElementById('category-mesto');
        const sposobBtn = document.getElementById('category-sposob');

        let currentCardId = null;

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            
            // Слушаем данные от бота
            tg.onEvent('webAppData', (data) => {
                const response = JSON.parse(data.data);
                if (response.action === 'card_received') {
                    // Бот прислал картинку
                    currentCardId = response.card_id;
                    cardImage.src = response.url;
                    cardSlot.classList.add('has-card');
                    messageArea.textContent = `🎴 Вытянута улика! Выбери категорию.`;
                }
            });
        }

        drawBtn.addEventListener('click', () => {
            // Просим бота дать случайную картинку
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'get_card'
                }));
                messageArea.textContent = '🔄 Ищем улику...';
            } else {
                alert('Тест: запрос картинки (работает только в Telegram)');
                // Для теста в браузере показываем пример
                cardImage.src = 'https://via.placeholder.com/250x350?text=Улика';
                cardSlot.classList.add('has-card');
                messageArea.textContent = '🎴 Тестовая улика';
            }
        });

        function sendToBot(category) {
            if (!currentCardId) {
                alert('Сначала нужно взять улику!');
                return;
            }

            const data = {
                action: 'place_card',
                category: category,
                card_id: currentCardId
            };

            if (tg) {
                tg.sendData(JSON.stringify(data));
                messageArea.textContent = `✅ Карта отправлена в ${category}!`;
                cardSlot.classList.remove('has-card');
                cardImage.src = '';
                currentCardId = null;
            } else {
                alert(`[Тест] Отправлено в ${category}`);
            }
        }

        motivBtn.addEventListener('click', () => sendToBot('МОТИВ'));
        mestoBtn.addEventListener('click', () => sendToBot('МЕСТО'));
        sposobBtn.addEventListener('click', () => sendToBot('СПОСОБ'));
    </script>
</body>
</html>
