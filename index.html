<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письма Призрака — Стол улик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: #1a0f0a;
            color: #e8d5b5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(44, 26, 18, 0.9);
            border: 3px solid #b68b6e;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        button {
            background: #8b6f50;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.2em;
            color: white;
            cursor: pointer;
            margin: 20px 0;
        }
        .card-place {
            width: 280px;
            height: 380px;
            margin: 20px auto;
            background: #2f1f16;
            border: 3px solid #b68b6e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            overflow: hidden;
        }
        .card-place img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message-area {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🕯️ СТОЛ УЛИК 🕯️</h1>
        <div class="card-place" id="card-place">
            <div id="placeholder">🃏</div>
            <img id="card-image" style="display:none">
        </div>
        <button id="draw-card">🎴 Взять улику</button>
        <div class="message-area" id="message">Нажми на кнопку, чтобы вытянуть улику</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            console.log('Mini App готов');
        }

        const drawBtn = document.getElementById('draw-card');
        const placeholder = document.getElementById('placeholder');
        const cardImage = document.getElementById('card-image');
        const messageArea = document.getElementById('message');

        drawBtn.addEventListener('click', () => {
            if (!tg) {
                messageArea.innerText = '❌ Открой через Telegram';
                return;
            }
            messageArea.innerText = '🔄 Ищу улику...';
            tg.sendData(JSON.stringify({ action: 'get_card' }));
        });

        if (tg) {
            tg.onEvent('webAppData', (data) => {
                console.log('Ответ:', data);
                try {
                    const res = JSON.parse(data);
                    if (res.action === 'card_received') {
                        placeholder.style.display = 'none';
                        cardImage.src = res.url;
                        cardImage.style.display = 'block';
                        messageArea.innerText = '🎴 Улика получена!';
                    } else if (res.action === 'error') {
                        messageArea.innerText = '❌ ' + res.message;
                    }
                } catch(e) {
                    console.error('Ошибка', e);
                }
            });
        }
    </script>
</body>
</html>
