<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стол улик</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1b0e;
            color: #f0e6d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%233d2b1a"/><path d="M10 10 L90 10 L90 90 L10 90 Z" fill="none" stroke="%23b89b7b" stroke-width="2" stroke-dasharray="5 5"/></svg>');
            background-repeat: repeat;
        }
        .table {
            background-color: #3d2b1a;
            border: 8px solid #6b4f3a;
            border-radius: 20px;
            padding: 25px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #e6d7b8;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px #000;
        }
        .categories {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 10px;
        }
        .category-card {
            background-color: #5c4330;
            border: 2px solid #b89b7b;
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            flex: 1;
            font-weight: bold;
            color: #ffebcd;
            box-shadow: inset 0 0 5px #2b1b0e;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }
        .category-card:active {
            transform: scale(0.95);
            background-color: #7b624a;
        }
        .card-slot {
            background-color: #2b1b0e;
            border: 2px dashed #b89b7b;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            color: #a7a7a7;
            font-style: italic;
        }
        .button {
            background-color: #8b6f50;
            border: none;
            border-radius: 30px;
            padding: 15px 25px;
            font-size: 1.2em;
            font-weight: bold;
            color: #f0e6d2;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 5px 0 #4a3a2a;
            margin-top: 15px;
        }
        .button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #4a3a2a;
        }
        #card-display {
            margin: 20px 0;
            text-align: center;
            font-size: 1.1em;
            background-color: #4a3a2a;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="table">
        <h1>🕯️ СТОЛ УЛИК 🕯️</h1>

        <div class="categories">
            <div class="category-card" id="category-motiv">🗡️ МОТИВ</div>
            <div class="category-card" id="category-mesto">📍 МЕСТО</div>
            <div class="category-card" id="category-sposob">⚰️ СПОСОБ</div>
        </div>

        <div id="card-display">
            Нажми на кнопку внизу, чтобы вытянуть улику
        </div>

        <div class="card-slot" id="card-slot">
            🃏 Сюда будет положена карта
        </div>

        <button class="button" id="draw-card-btn">🃏 Взять улику</button>
    </div>

    <!-- Подключаем Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        console.log("Скрипт загружен");

        const drawButton = document.getElementById('draw-card-btn');
        const cardDisplay = document.getElementById('card-display');
        const cardSlot = document.getElementById('card-slot');
        const motivButton = document.getElementById('category-motiv');
        const mestoButton = document.getElementById('category-mesto');
        const sposobButton = document.getElementById('category-sposob');

        let currentCard = null;
        let currentPlayer = "Игрок";

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            console.log("Telegram Web App инициализирован");
        } else {
            console.log("Запуск вне Telegram (режим разработки)");
        }

        drawButton.addEventListener('click', () => {
            const cards = ['🛞 Колесо', '🔪 Нож', '💰 Деньги', '🏠 Дом', '⚱️ Яд'];
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            currentCard = randomCard;
            cardDisplay.innerText = `🎴 Вытянута улика: ${currentCard}`;
            cardSlot.innerText = `🃏 Карта "${currentCard}" готова. Выбери категорию!`;
        });

        function sendDataToBot(category) {
            if (!currentCard) {
                alert('Сначала нужно взять улику!');
                return;
            }

            const dataToSend = {
                action: 'place_card',
                category: category,
                card: currentCard,
                player: currentPlayer
            };

            console.log('Отправка данных боту:', JSON.stringify(dataToSend));

            if (tg) {
                tg.sendData(JSON.stringify(dataToSend));
                currentCard = null;
                cardDisplay.innerText = 'Нажми на кнопку, чтобы вытянуть новую улику';
                cardSlot.innerText = '🃏 Карта отправлена на стол!';
            } else {
                alert(`[Тест] Данные отправлены: ${JSON.stringify(dataToSend)}`);
            }
        }

        motivButton.addEventListener('click', () => sendDataToBot('МОТИВ'));
        mestoButton.addEventListener('click', () => sendDataToBot('МЕСТО'));
        sposobButton.addEventListener('click', () => sendDataToBot('СПОСОБ'));

    </script>
</body>
</html>
