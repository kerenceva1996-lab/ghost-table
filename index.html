<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письма Призрака</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1a0f0a;
            color: #e8d5b5;
            font-family: Georgia;
            text-align: center;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        button {
            background: #8b6f50;
            border: none;
            border-radius: 50px;
            padding: 18px 40px;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 7px 0 #3e2e22;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #3e2e22;
        }
    </style>
</head>
<body>
    <button id="draw-card">🎴 Взять улику</button>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.ready();

        document.getElementById('draw-card').onclick = () => {
            if (!tg) {
                alert('Открой через Telegram');
                return;
            }
            tg.sendData(JSON.stringify({ action: 'get_card' }));
            tg.close(); // Закрывает мини-приложение после нажатия
        };
    </script>
</body>
</html>
